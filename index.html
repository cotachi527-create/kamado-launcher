  // ── 表計算（Excel風）ボード ──
  const EXCEL_COLS = 12;
  const EXCEL_ROWS = 25;
  const _excelData = {};
  let _excelActiveCell = 'A1';

  function renderExcelBoard(area) {
    const colLetters = Array.from({length: EXCEL_COLS}, (_, i) => String.fromCharCode(65 + i));
    let tHead = `<tr><th class="excel-th row-num"></th>${colLetters.map(c => `<th class="excel-th">${c}</th>`).join('')}</tr>`;
    let tBody = '';
    for (let r = 1; r <= EXCEL_ROWS; r++) {
      tBody += `<tr><td class="excel-row-num">${r}</td>`;
      colLetters.forEach(c => {
        const ref = c + r;
        tBody += `<td class="excel-cell-td"><input class="excel-cell-input" id="exc-${ref}" data-ref="${ref}" value="${_excelData[ref] || ''}" onchange="excelChange('${ref}',this.value)" onfocus="excelFocus('${ref}')" onkeydown="excelKeyNav(event,'${ref}')" /></td>`;
      });
      tBody += '</tr>';
    }
    area.innerHTML = `
      <div class="excel-formula-bar">
        <span class="excel-cell-ref" id="exc-ref-display">A1</span>
        <span style="color:var(--text-sub);font-size:0.75rem">fx</span>
        <input class="excel-formula-input" id="exc-formula-bar" placeholder="値または =SUM(A1:A5)" onchange="excelFormulaBarChange(this.value)" />
      </div>
      <div class="excel-wrap">
        <table class="excel-table"><thead>${tHead}</thead><tbody>${tBody}</tbody></table>
      </div>
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:4px">
        <button class="clear-btn" onclick="excelClear()">クリア</button>
        <button class="generate-btn" style="font-size:0.76rem;padding:7px 16px" onclick="excelCopyCSV()">📋 CSVコピー</button>
      </div>`;
  }

  function excelFocus(ref) {
    _excelActiveCell = ref;
    const display = document.getElementById('exc-ref-display');
    const bar = document.getElementById('exc-formula-bar');
    if (display) display.textContent = ref;
    if (bar) bar.value = _excelData[ref] || '';
  }

  function excelChange(ref, raw) {
    _excelData[ref] = raw;
    excelRecalcAll();
  }

  function excelFormulaBarChange(val) {
    _excelData[_excelActiveCell] = val;
    const cell = document.getElementById('exc-' + _excelActiveCell);
    if (cell) cell.value = val;
    excelRecalcAll();
  }

  function excelRecalcAll() {
    Object.keys(_excelData).forEach(ref => {
      const cell = document.getElementById('exc-' + ref);
      if (!cell) return;
      const raw = _excelData[ref] || '';
      if (raw.startsWith('=')) {
        try { cell.value = String(excelEval(raw.slice(1))); }
        catch { cell.value = '#ERR'; }
      } else {
        cell.value = raw;
      }
    });
  }

  function excelEval(expr) {
    const rangeRe = /([A-Z]+)(\d+):([A-Z]+)(\d+)/g;
    const expanded = expr.replace(rangeRe, (_, c1, r1, c2, r2) => {
      const vals = [];
      for (let r = +r1; r <= +r2; r++) {
        for (let cc = c1.charCodeAt(0); cc <= c2.charCodeAt(0); cc++) {
          const v = parseFloat(_excelData[String.fromCharCode(cc) + r] || '0') || 0;
          vals.push(v);
        }
      }
      return vals.join(',');
    });
    const withFns = expanded
      .replace(/SUM\(([^)]+)\)/g, (_, args) => args.split(',').reduce((s, v) => s + (parseFloat(v) || 0), 0))
      .replace(/AVG\(([^)]+)\)/g, (_, args) => { const a = args.split(',').map(v => parseFloat(v)||0); return a.reduce((s,v)=>s+v,0)/a.length; })
      .replace(/COUNT\(([^)]+)\)/g, (_, args) => args.split(',').filter(v=>v.trim()!=='').length)
      .replace(/MAX\(([^)]+)\)/g, (_, args) => Math.max(...args.split(',').map(v=>parseFloat(v)||0)))
      .replace(/MIN\(([^)]+)\)/g, (_, args) => Math.min(...args.split(',').map(v=>parseFloat(v)||0)));
    const cellRe = /([A-Z]+)(\d+)/g;
    const resolved = withFns.replace(cellRe, (_, c, r) => {
      const v = _excelData[c + r] || '0';
      return v.startsWith('=') ? '0' : (parseFloat(v) || 0);
    });
    return Function('"use strict";return (' + resolved + ')')();
  }

  function excelKeyNav(e, ref) {
    const col = ref[0]; const row = parseInt(ref.slice(1));
    const colLetters = Array.from({length: EXCEL_COLS}, (_, i) => String.fromCharCode(65 + i));
    const colIdx = colLetters.indexOf(col);
    let next = null;
    if (e.key === 'Tab') { e.preventDefault(); next = colIdx < EXCEL_COLS - 1 ? (colLetters[colIdx+1] + row) : (colLetters[0] + (row < EXCEL_ROWS ? row+1 : row)); }
    else if (e.key === 'Enter') { e.preventDefault(); next = row < EXCEL_ROWS ? (col + (row+1)) : ref; }
    else if (e.key === 'ArrowRight') next = colIdx < EXCEL_COLS-1 ? (colLetters[colIdx+1]+row) : null;
    else if (e.key === 'ArrowLeft')  next = colIdx > 0 ? (colLetters[colIdx-1]+row) : null;
    else if (e.key === 'ArrowDown')  next = row < EXCEL_ROWS ? (col+(row+1)) : null;
    else if (e.key === 'ArrowUp')    next = row > 1 ? (col+(row-1)) : null;
    if (next) { const el = document.getElementById('exc-' + next); if (el) el.focus(); }
  }

  function excelClear() {
    Object.keys(_excelData).forEach(k => { _excelData[k] = ''; const el = document.getElementById('exc-'+k); if(el) el.value=''; });
  }

  function excelCopyCSV() {
    const colLetters = Array.from({length: EXCEL_COLS}, (_, i) => String.fromCharCode(65+i));
    const rows = [];
    for (let r = 1; r <= EXCEL_ROWS; r++) {
      const row = colLetters.map(c => _excelData[c+r] || '');
      if (row.some(v => v)) rows.push(row.join('\t'));
    }
    navigator.clipboard.writeText(rows.join('\n')).then(() => {}).catch(() => {});
  }

  function toggleMic() {

    if (!SpeechRecognition) {
      alert('このブラウザは音声入力に対応していません。\nChrome をお使いください。');

    recognition.continuous     = false;
    recognition.interimResults = true;

    const btn    = document.getElementById('mic-btn');
    const status = document.getElementById('mic-status');
    const input  = document.getElementById('prompt-input');
    const base   = input.value;

    recognition.onstart  = () => { isRecording = true;  btn.classList.add('recording');    status.textContent = '🔴 録音中…'; };
    recognition.onresult = e  => { input.value = base ? base + ' ' + Array.from(e.results).map(r => r[0].transcript).join('') : Array.from(e.results).map(r => r[0].transcript).join(''); };
    recognition.onend    = () => { isRecording = false; btn.classList.remove('recording'); status.textContent = ''; };
    recognition.onerror  = e  => { isRecording = false; btn.classList.remove('recording'); status.textContent = ''; if (e.error !== 'aborted') alert('音声入力エラー: ' + e.error); };
    recognition.start();
  }

  // ── Image input ──
  function handleImageInput(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      document.getElementById('image-preview').src = ev.target.result;
      document.getElementById('image-preview-wrap').style.display = 'block';
    };
    reader.readAsDataURL(file);
    e.target.value = '';
  }

  function removeImage() {
    document.getElementById('image-preview-wrap').style.display = 'none';
    document.getElementById('image-preview').src = '';
  }

  // ── [FIX③] Generate: クリップボードの堅牢化 + ボタン二重クリック防止 ──
  async function handleGenerate() {
    const prompt  = document.getElementById('prompt-input').value.trim();
    const toolUrl = document.getElementById('tool-select').value;
    const btn     = document.getElementById('generate-btn');
    if (!prompt) { document.getElementById('prompt-input').focus(); return; }
    if (btn.disabled) return;

    // クリップボードコピー（複数フォールバック）
    let copied = false;
    try {
      await navigator.clipboard.writeText(prompt);
      copied = true;
    } catch {
      try {
        const ta = document.createElement('textarea');
        ta.value = prompt;
        ta.style.cssText = 'position:fixed;opacity:0;top:0;left:0';
        document.body.appendChild(ta);
        ta.focus();
        ta.select();
        copied = document.execCommand('copy');
        document.body.removeChild(ta);
      } catch { copied = false; }
    }

    // ツールを新しいタブで開く
    window.open(toolUrl, '_blank', 'noopener');

    btn.textContent = copied ? '✓ コピー済み' : '✓ 開きました';
    btn.classList.add('copied');
    btn.disabled = true;
    setTimeout(() => {
      btn.textContent = '生成';
      btn.classList.remove('copied');
      btn.disabled = false;
    }, 2000);
  }

  // ══════════════════════════════════════════════════
  //  フォルダ画像ブラウザ（過去の制作物）
  // ══════════════════════════════════════════════════
  const IMG_EXTS        = new Set(['jpg','jpeg','png','webp','gif']);
  const IMG_FOLDER_IDBK = 'img_folder_handle';
  let _imgFolderHandle  = null;
  let _imgObjectUrls    = [];  // for revoking on refresh
  let _lightboxItems    = [];  // { url, name }
  let _lightboxIdx      = 0;

  async function pickImageFolder() {
    try {
      const handle = await window.showDirectoryPicker({ mode: 'read' });
      _imgFolderHandle = handle;
      await _saveImgHandle(handle);
      // フォルダ名を Firestore に記録（他デバイスへのヒント用）
      _fbSaveFolderName(handle.name);
      // ヒントを非表示
      const hint = document.getElementById('fb-folder-hint');
      if (hint) hint.style.display = 'none';
      await buildImgGallery();
    } catch (e) { /* AbortError = ユーザーキャンセル */ }
  }

  function disconnectImgFolder() {
    _revokeImgUrls();
    _imgFolderHandle = null;
    _clearImgHandle();
    document.getElementById('img-folder-bar').style.display  = 'none';
    document.getElementById('img-placeholder').style.display = 'flex';
    document.getElementById('img-grid').style.display        = 'none';
    document.getElementById('img-grid').innerHTML            = '';
  }

  function _revokeImgUrls() {
    _imgObjectUrls.forEach(u => URL.revokeObjectURL(u));
    _imgObjectUrls = [];
  }

  async function buildImgGallery() {
    if (!_imgFolderHandle) return;

    // 権限確認
    const perm = await _imgFolderHandle.queryPermission({ mode: 'read' });
    if (perm !== 'granted') {
      const req = await _imgFolderHandle.requestPermission({ mode: 'read' });
      if (req !== 'granted') { disconnectImgFolder(); return; }
    }

    document.getElementById('img-folder-name').textContent  = _imgFolderHandle.name;
    document.getElementById('img-folder-bar').style.display = 'flex';
    document.getElementById('img-placeholder').style.display = 'none';

    const grid = document.getElementById('img-grid');
    grid.style.display = 'grid';
    grid.innerHTML     = '<div style="grid-column:1/-1;text-align:center;color:var(--text-sub);font-size:0.75rem;padding:12px">読み込み中…</div>';

    // ファイル一覧取得
    _revokeImgUrls();
    const files = [];
    for await (const [name, handle] of _imgFolderHandle.entries()) {
      if (handle.kind !== 'file') continue;
      const ext = name.split('.').pop().toLowerCase();
      if (IMG_EXTS.has(ext)) files.push({ name, handle });
    }
    files.sort((a, b) => a.name.localeCompare(b.name, 'ja'));

    grid.innerHTML = '';
    _lightboxItems = [];

    if (files.length === 0) {
      const msg = document.createElement('div');
      msg.style.cssText = 'grid-column:1/-1;text-align:center;color:var(--text-sub);font-size:0.75rem;padding:20px;line-height:2';
      msg.textContent   = '対応画像（jpg / png / webp / gif）が見つかりません';
      grid.appendChild(msg);
      return;
    }

    for (let i = 0; i < files.length; i++) {
      const f    = files[i];
      const file = await f.handle.getFile();
      const url  = URL.createObjectURL(file);
      _imgObjectUrls.push(url);
      _lightboxItems.push({ url, name: f.name });

      const idx  = i;
      const item = document.createElement('div');
      item.className = 'img-item';

      const img  = document.createElement('img');
      img.className = 'img-thumb';
      img.src       = url;
      img.alt       = f.name;
      img.loading   = 'lazy';
      img.decoding  = 'async';

      const label = document.createElement('div');
      label.className   = 'img-name';
      label.textContent = f.name.replace(/\.[^.]+$/, '');
      label.title       = f.name;

      item.appendChild(img);
      item.appendChild(label);
      item.addEventListener('click', () => openLightbox(idx));

      // ギャラリー → ボードへのドラッグ
      item.draggable = true;
      item.style.cursor = 'grab';
      item.addEventListener('dragstart', e => {
        e.dataTransfer.effectAllowed = 'copy';
        e.dataTransfer.setData('text/x-gallery-url', url);
        e.dataTransfer.setData('text/uri-list', url);
        item.style.opacity = '0.5';
      });
      item.addEventListener('dragend', () => { item.style.opacity = ''; });

      grid.appendChild(item);
    }
  }

  // ── Lightbox ──
  const IMG_PROMPT_PREFIX = 'img_prompt_';

  function _promptKey(filename) { return IMG_PROMPT_PREFIX + filename; }

  function openLightbox(idx) {
    _lightboxIdx = idx;
    _cancelPromptEditState();
    _updateLightbox();
    document.getElementById('lightbox').classList.add('open');
    document.addEventListener('keydown', _lightboxKey);
  }

  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('open');
    document.removeEventListener('keydown', _lightboxKey);
    _cancelPromptEditState();
  }

  function _updateLightbox() {
    const item = _lightboxItems[_lightboxIdx];
    if (!item) return;
    document.getElementById('lightbox-img').src          = item.url;
    document.getElementById('lightbox-name').textContent = item.name;
    document.getElementById('lightbox-prev').style.display = _lightboxIdx > 0 ? 'block' : 'none';
    document.getElementById('lightbox-next').style.display = _lightboxIdx < _lightboxItems.length - 1 ? 'block' : 'none';

    // プロンプト表示
    const prompt  = localStorage.getItem(_promptKey(item.name)) || '';
    const display = document.getElementById('lightbox-prompt-display');
    display.textContent = prompt || '（まだプロンプトがありません）';
    display.classList.toggle('has-prompt', !!prompt);
  }

  function lightboxNav(dir) {
    const next = _lightboxIdx + dir;
    if (next < 0 || next >= _lightboxItems.length) return;
    _cancelPromptEditState();
    _lightboxIdx = next;
    _updateLightbox();
  }

  function _lightboxKey(e) {
    if (e.key === 'ArrowLeft')  lightboxNav(-1);
    if (e.key === 'ArrowRight') lightboxNav(1);
    if (e.key === 'Escape')     closeLightbox();
  }

  // ── プロンプト編集 ──
  function togglePromptEdit() {
    const editArea = document.getElementById('lightbox-prompt-edit');
    const isEditing = editArea.style.display !== 'none';
    if (isEditing) {
      cancelPromptEdit();
    } else {
      const item   = _lightboxItems[_lightboxIdx];
      const prompt = localStorage.getItem(_promptKey(item.name)) || '';
      editArea.value = prompt;
      document.getElementById('lightbox-prompt-display').style.display = 'none';
      editArea.style.display = 'block';
      document.getElementById('lightbox-prompt-actions').style.display = 'flex';
      document.getElementById('lightbox-prompt-toggle').textContent = 'キャンセル';
      editArea.focus();
    }
  }

  function cancelPromptEdit() {
    _cancelPromptEditState();
    _updateLightbox();
  }

  function _cancelPromptEditState() {
    const editArea = document.getElementById('lightbox-prompt-edit');
    if (!editArea) return;
    editArea.style.display = 'none';
    document.getElementById('lightbox-prompt-display').style.display = 'block';
    document.getElementById('lightbox-prompt-actions').style.display = 'none';
    document.getElementById('lightbox-prompt-toggle').textContent = '✏ 編集';
  }

  function savePrompt() {
    const item   = _lightboxItems[_lightboxIdx];
    const prompt = document.getElementById('lightbox-prompt-edit').value.trim();
    if (prompt) {
      localStorage.setItem(_promptKey(item.name), prompt);
    } else {
      localStorage.removeItem(_promptKey(item.name));
    }
    _cancelPromptEditState();
    _updateLightbox();
  }

  // ── IndexedDB でフォルダハンドルを保存・復元 ──
  function _imgIDB() {
    return new Promise((res, rej) => {
      const req = indexedDB.open('imgFolderDB', 1);
      req.onupgradeneeded = e => e.target.result.createObjectStore('handles');
      req.onsuccess = e => res(e.target.result);
      req.onerror   = e => rej(e);
    });
  }
  async function _saveImgHandle(handle) {
    const db = await _imgIDB();
    return new Promise((res, rej) => {
      const tx = db.transaction('handles', 'readwrite');
      tx.objectStore('handles').put(handle, IMG_FOLDER_IDBK);
      tx.oncomplete = () => res();
      tx.onerror    = e => rej(e);
    });
  }
  async function _loadImgHandle() {
    const db = await _imgIDB();
    return new Promise((res, rej) => {
      const tx = db.transaction('handles', 'readonly');
      const req = tx.objectStore('handles').get(IMG_FOLDER_IDBK);
      req.onsuccess = () => res(req.result || null);
      req.onerror   = e => rej(e);
    });
  }
  async function _clearImgHandle() {
    const db = await _imgIDB();
    return new Promise((res, rej) => {
      const tx = db.transaction('handles', 'readwrite');
      tx.objectStore('handles').delete(IMG_FOLDER_IDBK);
      tx.oncomplete = () => res();
      tx.onerror    = e => rej(e);
    });
  }

  document.querySelectorAll('.modal-overlay').forEach(overlay => {
    overlay.addEventListener('click', e => {
      if (e.target === overlay) overlay.classList.remove('open');
    });
  });

  // ── Weekly history ──
  function buildHistoryGrid() {
    const DAY_LABELS = ['日', '月', '火', '水', '木', '金', '土'];
    const grid = document.getElementById('history-grid');
    grid.innerHTML = '';

    const days = Array.from({ length: 7 }, (_, i) => {
      const d = new Date();
      d.setDate(d.getDate() - (6 - i));
      return { date: d, str: toDateStr(d), isToday: i === 6 };
    });

    const corner = document.createElement('div');
    corner.className = 'hg-cell hg-empty';
    grid.appendChild(corner);

    days.forEach(({ date, isToday }) => {
      const cell = document.createElement('div');
      cell.className = `hg-cell hg-day-header${isToday ? ' today-col' : ''}`;
      const dayLabel = document.createElement('span');
      dayLabel.className   = 'hg-day-label';
      dayLabel.textContent = isToday ? '今日' : DAY_LABELS[date.getDay()];
      const dateNum = document.createElement('span');
      dateNum.className   = 'hg-date-num';
      dateNum.textContent = `${date.getMonth() + 1}/${date.getDate()}`;
      cell.appendChild(dayLabel);
      cell.appendChild(dateNum);
      grid.appendChild(cell);
    });

    TASKS.forEach(task => {
      const labelCell = document.createElement('div');
      labelCell.className   = 'hg-cell hg-task-label';
      labelCell.textContent = task.label;
      grid.appendChild(labelCell);

      days.forEach(({ str, isToday }) => {
        const donelist = _memLSGet(STORAGE_PREFIX + str, []);
        const done = donelist.includes(task.label);
        const cell = document.createElement('div');
        cell.className = `hg-cell hg-check${done ? ' done' : ''}${isToday ? ' today-col' : ''}`;
        const dot  = document.createElement('span'); dot.className = 'hg-dot';
        const tick = document.createElement('span'); tick.className = 'hg-tick'; tick.textContent = '✓';
        cell.appendChild(dot);
        cell.appendChild(tick);
        grid.appendChild(cell);
      });
    });
  }

  // ── Init ──
  async function init() {
    _fbInit();   // Firebase 初期化（認証状態の監視開始）

    renderLauncherCards();
    initBoardSystem();
    initCalendar();
    buildTaskList();
    buildHistoryGrid();
    syncFromGAS();

    // 画像フォルダを復元
    try {
      const stored = await _loadImgHandle();
      if (stored) {
        _imgFolderHandle = stored;
        await buildImgGallery();
      }
    } catch { /* ignore */ }
  }

  init();
</script>
